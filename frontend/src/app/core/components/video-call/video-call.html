<div class="video-call">
  @if (isLoading()) {
    <div class="call-loading">
      <div class="spinner"></div>
      <p>Joining call...</p>
    </div>
  }

  @if (error()) {
    <div class="call-error">
      <p>{{ error() }}</p>
      <button class="btn btn-primary" (click)="leave()">Go Back</button>
    </div>
  }

  <div class="video-grid">
    <!-- Local tile -->
    <div class="video-tile local-tile">
      <video class="video-element" autoplay playsinline muted [attr.data-participant-id]="'local'"></video>
      <span class="tile-label">You {{ isCamOff() ? '(Camera off)' : '' }}</span>
    </div>

    <!-- Remote tiles -->
    @for (tile of tiles(); track tile.id) {
      <div class="video-tile">
        @if (tile.hasVideo) {
          <video class="video-element" autoplay playsinline [attr.data-participant-id]="tile.id"></video>
        } @else {
          <div class="video-placeholder">
            <span class="placeholder-avatar">{{ tile.displayName.charAt(0).toUpperCase() }}</span>
          </div>
        }
        <span class="tile-label">{{ tile.displayName }}</span>
      </div>
    }
  </div>

  <div class="call-controls">
    <button class="control-btn" [class.muted]="isMicMuted()" (click)="toggleMic()">
      {{ isMicMuted() ? '🔇' : '🎤' }}
    </button>
    <button class="control-btn" [class.muted]="isCamOff()" (click)="toggleCam()">
      {{ isCamOff() ? '📵' : '📹' }}
    </button>
    <button class="control-btn hangup" (click)="leave()">📞</button>
  </div>
</div>
