name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Test backend
        working-directory: backend
        run: |
          chmod +x gradlew
          ./gradlew test --no-daemon

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  publish-images:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: backend
            context: ./backend
          - component: frontend
            context: ./frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        shell: bash
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/chatrix-${{ matrix.component }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}

      - name: Build and optionally publish image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  deploy:
    needs: publish-images
    if: github.event_name == 'push' && vars.ENABLE_CD == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure cluster access
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Apply manifests and deploy new images
        shell: bash
        run: |
          kubectl apply -k k8s
          kubectl -n streamlink set image deployment/backend backend=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/chatrix-backend:sha-${GITHUB_SHA}
          kubectl -n streamlink set image deployment/frontend frontend=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/chatrix-frontend:sha-${GITHUB_SHA}
          kubectl -n streamlink rollout status deployment/backend --timeout=180s
          kubectl -n streamlink rollout status deployment/frontend --timeout=180s
