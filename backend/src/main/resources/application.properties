spring.application.name=backend

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/videochat
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=change-this-to-a-secure-random-secret-key-of-at-least-256-bits-for-hs256
jwt.expiration-ms=86400000
jwt.issuer=backend

# Mux API
mux.access-token-id=your-mux-access-token-id
mux.secret-key=your-mux-secret-key
mux.base-url=https://api.mux.com
mux.webhook-secret=your-mux-webhook-secret

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4200
