spring.application.name=video-chat-backend-test

# H2 Test Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests
spring.flyway.enabled=false

# JWT
jwt.secret=test-secret-key-for-jwt-signing-only-not-for-production
jwt.expiration-ms=86400000
jwt.issuer=video-chat-backend-test

# Mux API
mux.access-token-id=test-mux-token
mux.secret-key=test-mux-secret
mux.base-url=https://api.mux.com
mux.webhook-secret=test-webhook-secret

# CORS
app.cors.allowed-origins=http://localhost:3000
