<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-header">
      <h1>Create account</h1>
      <p>Get started with your free account</p>
    </div>

    @if (error()) {
      <div class="auth-error">{{ error() }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" type="text" [(ngModel)]="name" name="name" [minlength]="1" [maxlength]="AppConstants.MAX_NAME_LENGTH" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" [(ngModel)]="username" name="username" [minlength]="AppConstants.MIN_USERNAME_LENGTH" [maxlength]="AppConstants.MAX_USERNAME_LENGTH" placeholder="johndoe" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" [minlength]="AppConstants.MIN_PASSWORD_LENGTH" [maxlength]="AppConstants.MAX_PASSWORD_LENGTH" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary submit-btn" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a [routerLink]="['/' + RouteConstants.LOGIN]">Log in</a></p>
    </div>
  </div>
</div>
